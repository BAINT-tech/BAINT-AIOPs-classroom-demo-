<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BAINT OS – Classroom Assistant Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #f3f3f3;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.laptop {
  width: 960px;
  height: 650px;
  background: #000;
  border-radius: 28px;
  padding: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
}

.top-bar {
  height: 36px;
  background: #1c1c1c;
  border-radius: 18px 18px 0 0;
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 14px;
  font-weight: bold;
}

.screen-shell {
  flex: 1;
  background: #f9fafb;
  border-radius: 0 0 28px 28px;
  margin-top: 6px;
  padding: 22px;
  overflow-y: auto;
}

.section { margin-bottom: 20px; }

.section h4 { margin: 0 0 8px; font-size: 15px; }

select, input {
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  font-size: 14px;
  margin-right: 8px;
}

input[type="text"], input[type="email"] {
  width: 60%;
}

.card {
  background: #fff;
  border-radius: 14px;
  padding: 16px;
  border: 1px solid #e5e7eb;
  font-size: 14px;
  line-height: 1.6;
  min-height: 60px;
}

button {
  background: #2563eb;
  border: none;
  padding: 10px 18px;
  border-radius: 10px;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
  margin-top: 6px;
}

button.mic { background: #10b981; margin-left: 8px; }

.waitlist {
  background: #eef2ff;
  border: 1px dashed #6366f1;
  border-radius: 14px;
  padding: 16px;
}

.success {
  color: #047857;
  font-size: 13px;
  margin-top: 8px;
}

.subtitles {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  background: rgba(0,0,0,0.8);
  color: #fff;
  padding: 12px;
  border-radius: 12px;
  font-size: 13px;
  display: none;
  text-align: center;
}

.disclaimer {
  font-size: 12px;
  color: #6b7280;
  margin-top: 6px;
}
</style>
</head>

<body>

<div class="laptop">
  <div class="top-bar">BAINT OS — Classroom Assistant Demo</div>

  <div class="screen-shell">

    <!-- LAUNCH -->
     <div id="app-launcher" class="section">  
      <img src="logo.png" style="width:120px;height:120px;margin-bottom:12px;">  
      <h3 onclick="launchDemo()" style="cursor:pointer;">  
      <h3 onclick="launchDemo()" style="cursor:pointer;">
        Click to Launch BAINT Classroom Demo
      </h3>
 <div class="disclaimer">Demo partially AI-assisted for guidance. Human supervision encouraged.</div>
    </div>

    <!-- BOOT -->
    <div class="section" id="boot" style="display:none;">
      <div style="background:#111;color:#0f0;font-family:monospace;padding:20px;">
  <div id="app-launcher" class="section">
  <img src="logo.png" alt="Baint OS Logo" style="width:120px;height:120px;margin-bottom:12px;">
  <h3 style="cursor:pointer;" onclick="launchDemo()">Click to Launch BAINT Classroom Demo</h3>
  </div>
       <div id="boot-log"></div>
      </div>
    </div>

    <!-- DEMO -->
    <div id="demo" style="display:none;">

      <!-- SUBJECT + LANGUAGE -->
      <div class="section">
        <h4>Learning Setup</h4>

        <select id="language">
          <option value="en">English</option>
          <option value="zh">Chinese</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
        </select>

        <select id="subject" onchange="updateTopics(); updateContent();">
          <option value="biology">Biology</option>
          <option value="history">History</option>
          <option value="science">Science</option>
          <option value="math">Mathematics</option>
          <option value="computer">Computer Science</option>
        </select>

        <select id="topic" onchange="updateContent()"></select>
      </div>

      <!-- EXPLANATION -->
      <div class="section">
        <h4>BAINT AI Classroom Assistant</h4>
        <div class="card" id="explanation"></div>

        <button onclick="speak()">🎙️ BAINT Voice Explainer</button>
        <button onclick="stopVoice()">⏹ Stop Voice</button>
      </div>

      <!-- QUESTION -->
      <div class="section">
        <input type="text" id="studentQuestion" placeholder="Ask BAINT AI..." />
        <button onclick="answerQuestion()">Ask</button>

        <div class="card" id="teacherReply">BAINT AI will respond here...</div>
        <button onclick="speakReply()">🔊 Listen Answer</button>
      </div>

      <!-- FEEDBACK -->
      <div class="section">
        <h4>Feedback</h4>
        <input type="text" id="feedbackInput" />
        <button onclick="submitFeedback()">Submit</button>
        <div class="card" id="feedbackList"></div>
      </div>

      <!-- WAITLIST -->
      <div class="section waitlist">
        <h4>Join BAINT Waitlist</h4>
        <input type="email" id="waitlistEmail" />
        <button onclick="joinWaitlist()">Join</button>
        <div id="waitlistMessage" class="success"></div>
      </div>

    </div>
  </div>
</div>

<div class="subtitles" id="subtitles"></div>

<script>

const appLauncher=document.getElementById("app-launcher");
const bootScreen=document.getElementById("boot");
const demoScreen=document.getElementById("demo");
const bootLog=document.getElementById("boot-log");

const bootLines=[
"Booting BAINT AI...",
"Loading Classroom Engine...",
"Activating Voice System...",
"Ready."
];

/* DATA */
const data = {
  biology: {
    photosynthesis: `
Photosynthesis is the process plants use to make food.

Step 1: Plants take in sunlight through leaves  
Step 2: They absorb carbon dioxide from air  
Step 3: Water is absorbed from roots  
Step 4: Chlorophyll converts energy into glucose  

Example:
A tree uses sunlight to grow fruits and leaves.

Simple Summary:
Plants “eat” sunlight to survive.
`,

    cell: `
Cells are the basic building blocks of life.

Step 1: All living things are made of cells  
Step 2: Cells have nucleus, membrane, cytoplasm  
Step 3: They perform life functions  

Example:
Your skin is made of millions of cells.

Summary:
Cells = tiny units that form life.
`,

    digestion: `
Digestion is how food is broken down in the body.

Step 1: Food enters mouth  
Step 2: Stomach breaks it down  
Step 3: Nutrients are absorbed  

Example:
Rice becomes energy in your body.

Summary:
Digestion = turning food into energy.
`,

    genetics: `
Genetics is how traits are passed from parents.

Step 1: DNA carries information  
Step 2: Genes control traits  
Step 3: Traits are inherited  

Example:
Eye color comes from parents.

Summary:
Genes = biological information transfer.
`
  },

  math: {
    algebra: `
Algebra is solving unknown values using symbols.

Step 1: Identify unknown (x)  
Step 2: Form equation  
Step 3: Solve step-by-step  

Example:
x + 5 = 10 → x = 5  

Summary:
Algebra = solving missing numbers.
`,

    ratio: `
Ratios compare two quantities.

Step 1: Write values  
Step 2: Simplify  

Example:
2:4 = 1:2  

Summary:
Ratio = comparison tool.
`
  },

  science: {
    gravity: `
Gravity is a force that pulls objects down.

Step 1: Earth has mass  
Step 2: Mass creates pull  
Step 3: Everything falls toward Earth  

Example:
Apple falling from tree.

Summary:
Gravity = Earth's pulling force.
`,

    energy: `
Energy is the ability to do work.

Step 1: Exists in many forms  
Step 2: Can change form  
Step 3: Cannot be destroyed  

Example:
Food → energy for movement  

Summary:
Energy = power to do work.
`
  },

  history: {
    revolution: `
A revolution is a major change in society.

Step 1: People are dissatisfied  
Step 2: Conflict begins  
Step 3: Government changes  

Example:
French Revolution changed France.

Summary:
Revolution = big political change.
`,

    ww1: `
World War 1 was a global conflict.

Step 1: Political tension  
Step 2: Alliances formed  
Step 3: War begins in 1914  

Summary:
WW1 = global war between nations.
`
  },

  computer: {
    ai: `
AI is machines simulating human intelligence.

Step 1: Machines learn data  
Step 2: Patterns are recognized  
Step 3: Decisions are made  

Example:
Chatbots answering questions.

Summary:
AI = machine thinking system.
`,

    internet: `
Internet connects computers worldwide.

Step 1: Devices connect  
Step 2: Data is shared  
Step 3: Communication happens  

Summary:
Internet = global communication network.
`
  }
};

/* LAUNCH */
function launchDemo(){
  appLauncher.style.display="none";
  bootScreen.style.display="block";

  let i=0;
  function run(){
    if(i<bootLines.length){
      bootLog.innerHTML+=bootLines[i]+"<br>";
      i++;
      setTimeout(run,500);
    } else {
      setTimeout(()=>{
        bootScreen.style.display="none";
        demoScreen.style.display="block";
        updateTopics();
        updateContent();
      },500);
    }
  }
  run();
}

/* TOPICS */
function updateTopics(){
  const subject=document.getElementById("subject").value;
  const topic=document.getElementById("topic");

  topic.innerHTML="";

  const keys = Object.keys(data[subject]);

  keys.forEach(t=>{
    let opt=document.createElement("option");
    opt.value=t;
    opt.innerText = t.charAt(0).toUpperCase() + t.slice(1);
    topic.appendChild(opt);
  });

  topic.value = keys[0];
}
/* CONTENT */
function updateContent(){
  const s=document.getElementById("subject").value;
  const t=document.getElementById("topic").value;

  document.getElementById("explanation").innerText=
  "BAINT AI Classroom Assistant\n\n"+data[s][t];
}

/* VOICE SYSTEM */
let utterance;

function getVoice(lang) {
  const voices = speechSynthesis.getVoices();

  return voices.find(v =>
    v.lang.toLowerCase().includes(lang)
  ) || voices.find(v =>
    v.lang.toLowerCase().includes("en")
  );
}

function speak(){
  stopVoice();

  const lang = document.getElementById("language").value;
  const text = document.getElementById("explanation").innerText;

  document.getElementById("subtitles").style.display = "block";
  document.getElementById("subtitles").innerText = text;

  utterance = new SpeechSynthesisUtterance(text);

  // map dropdown to real browser codes
  let voiceLang = "en";

  if(lang === "zh") voiceLang = "zh";
  if(lang === "fr") voiceLang = "fr";
  if(lang === "es") voiceLang = "es";

  utterance.voice = getVoice(voiceLang);
  utterance.lang = voiceLang;

  speechSynthesis.speak(utterance);
}

function speakReply(){
  stopVoice();

  const lang = document.getElementById("language").value;
  const text = document.getElementById("teacherReply").innerText;

  document.getElementById("subtitles").style.display = "block";
  document.getElementById("subtitles").innerText = text;

  utterance = new SpeechSynthesisUtterance(text);

  let voiceLang = "en";

  if(lang === "zh") voiceLang = "zh";
  if(lang === "fr") voiceLang = "fr";
  if(lang === "es") voiceLang = "es";

  utterance.voice = getVoice(voiceLang);
  utterance.lang = voiceLang;

  speechSynthesis.speak(utterance);
}

function stopVoice(){
  speechSynthesis.cancel();
  document.getElementById("subtitles").style.display = "none";
}

// important fix: load voices properly
speechSynthesis.onvoiceschanged = () => {
  speechSynthesis.getVoices();
};

/* QUESTION */
function answerQuestion(){
  const q=document.getElementById("studentQuestion").value;
  const s=document.getElementById("subject").value;
  const t=document.getElementById("topic").value;

  document.getElementById("teacherReply").innerText=
`BAINT AI RESPONSE

Question: ${q}

Answer:
${data[s][t]}`;
}

/* FEEDBACK */
function submitFeedback(){
  const f=document.getElementById("feedbackInput").value;
  let list=JSON.parse(localStorage.getItem("baint_feedback"))||[];
  list.push(f);
  localStorage.setItem("baint_feedback",JSON.stringify(list));

  document.getElementById("feedbackList").innerHTML=
  list.map(x=>"• "+x).join("<br>");
}

/* WAITLIST */
function joinWaitlist(){
  const email=document.getElementById("waitlistEmail").value;

  let list=JSON.parse(localStorage.getItem("baint_waitlist"))||[];
  list.push(email);
  localStorage.setItem("baint_waitlist",JSON.stringify(list));

  window.location.href=
  `mailto:baintcomputer@gmail.com?subject=BAINT Waitlist&body=New signup: ${email}`;

  document.getElementById("waitlistMessage").innerText=
  "You're on the waitlist!";
}

</script>

</body>
</html>
